<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二战历史地图集 - 登录</title>
    <style>
        :root {
            --primary: #7a3b31;
            --primary-hover: #5c2a23;
            --bg-body: #e4d8c6;
            --text-main: #3e362c;
            --text-muted: #6e6150;
            --input-bg: #f8f3eb;
            --input-border: #c4b69d;
            --card-bg: #f4ebd8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Georgia", "Times New Roman", serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-body);
            background-image: url('data:image/svg+xml;utf8,<svg width="200" height="200" xmlns="http://www.w3.org/2000/svg"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23noise)" opacity="0.05"/></svg>');
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            height: 100%;
            max-height: 560px;
            background: var(--card-bg);
            border: 1px solid #c4b69d;
            border-radius: 4px;
            box-shadow: 0 15px 35px -5px rgba(62, 54, 44, 0.4);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .screen {
            flex: 1;
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
            background: transparent;
            position: relative;
        }

        /* 顶部装饰线 */
        .screen::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 30px;
            right: 30px;
            height: 2px;
            border-top: 1px solid var(--primary);
            border-bottom: 2px solid var(--primary);
            opacity: 0.8;
        }

        .header {
            margin-top: 50px;
            margin-bottom: 40px;
            text-align: center;
        }

        .header h1 {
            font-size: 26px;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 12px;
            letter-spacing: 1px;
            border-bottom: 1px solid #c4b69d;
            padding-bottom: 10px;
            display: inline-block;
        }

        .header p {
            font-size: 14px;
            color: var(--text-muted);
            font-style: italic;
        }

        .input-group {
            position: relative;
            margin-bottom: 24px;
        }

        .input-group label {
            position: absolute;
            left: 16px;
            top: 16px;
            color: var(--text-muted);
            font-size: 14px;
            transition: all 0.2s ease;
            pointer-events: none;
        }

        .input-group input {
            width: 100%;
            padding: 24px 16px 12px;
            border: 1px solid var(--input-border);
            border-radius: 2px;
            font-size: 16px;
            background: var(--input-bg);
            color: var(--text-main);
            outline: none;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }

        .input-group input:focus,
        .input-group input:not(:placeholder-shown) {
            background: #fffdf5;
            border-color: var(--primary);
        }

        .input-group input:focus + label,
        .input-group input:not(:placeholder-shown) + label {
            top: 8px;
            font-size: 11px;
            color: var(--primary);
            font-weight: bold;
        }

        .actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            font-size: 13px;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: var(--text-main);
        }

        .forgot-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: bold;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: #f4ebd8;
            border: 2px solid #5c2a23;
            border-radius: 2px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 2px 2px 0px rgba(92, 42, 35, 0.8);
        }

        .btn-login:hover {
            background: var(--primary-hover);
            transform: translate(1px, 1px);
            box-shadow: 1px 1px 0px rgba(92, 42, 35, 0.8);
        }

        .btn-login:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px rgba(92, 42, 35, 0.8);
        }

        .footer {
            margin-top: auto;
            text-align: center;
            font-size: 14px;
            color: var(--text-muted);
            padding-bottom: 0px;
            border-top: 1px dashed var(--input-border);
            padding-top: 20px;
            margin-bottom: 0;
        }

        .footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="screen">
            <div class="header">
                <h1>二战历史地图集</h1>
                <p>回望惨痛战役，铭记胜利来之不易</p>
            </div>

            <div class="form-container">
                <div class="input-group">
                    <input type="text" id="username" placeholder=" " autocomplete="off">
                    <label for="username">档案号 (账号)</label>
                </div>
                
                <div class="input-group">
                    <input type="password" id="password" placeholder=" ">
                    <label for="password">密令 (密码)</label>
                </div>

                <div class="actions">
                    <label class="checkbox-container">
                        <input type="checkbox"> 
                        <span class="checkmark"></span>
                        保存档案记录
                    </label>
                </div>

                <button class="btn-login" id="loginBtn" onclick="handleLogin()">
                    <span class="btn-text">调取档案</span>
                </button>
            </div>

            <div class="footer">
                尚未登记记录？ <a href="register-prototype.html">建立新档案</a>
            </div>
        </div>
    </div>

    <script>
        function handleLogin() {
            const btn = document.getElementById('loginBtn');
            btn.innerHTML = '<span style="opacity:0.8">调取中...</span>';
            setTimeout(() => {
                window.location.href = 'home-prototype.html';
            }, 1000);
        }
    </script>
</body>
</html>
